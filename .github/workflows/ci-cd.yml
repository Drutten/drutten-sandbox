name: CI/CD - Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive SHAs for Nx affected commands
        uses: nrwl/nx-set-shas@v5

      - name: Run affected lint
        run: pnpm nx affected -t lint

      - name: Run affected tests
        run: pnpm nx affected -t test

      - name: Run affected builds
        run: pnpm nx affected -t build

  test-gcp-auth:
    name: Test GCP Auth (WIF)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # auth@v3 requires create_credentials_file for gcloud/setup-gcloud to pick up ADC
      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/github
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify authentication
        run: |
          ACTIVE_SA=$(gcloud config get-value account)
          echo "Authenticated as: $ACTIVE_SA"
          test "$ACTIVE_SA" = "${{ secrets.GCP_SERVICE_ACCOUNT }}"
          gcloud run services list --region=europe-west1 --format="value(name)"

  deploy-infrastructure:
    name: Deploy Infrastructure with OpenTofu
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/terraform-deploy.yml
    secrets:
      project_number: ${{ secrets.GCP_PROJECT_NUMBER }}
      service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

